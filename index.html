<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spin to Decide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #18181c;
    --surface2: #222228;
    --accent: #f0c040;
    --accent2: #e87040;
    --text: #f5f5f0;
    --muted: #888880;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    letter-spacing: -0.02em;
    padding: 24px 20px 8px;
    text-align: center;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .wheel-container {
    position: relative;
    width: min(90vw, 380px);
    height: min(90vw, 380px);
    margin: 0 auto 20px;
  }

  canvas#wheelCanvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    filter: drop-shadow(0 0 32px rgba(240,192,64,0.15));
  }

  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid var(--accent);
    filter: drop-shadow(0 2px 8px rgba(240,192,64,0.5));
    z-index: 10;
  }

  .spin-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: #0d0d0f;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    box-shadow: 0 0 0 6px var(--bg), 0 0 0 8px rgba(240,192,64,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 10;
  }

  .spin-btn:hover:not(:disabled) {
    transform: translate(-50%, -50%) scale(1.07);
    box-shadow: 0 0 0 6px var(--bg), 0 0 0 10px rgba(240,192,64,0.5);
  }

  .spin-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  .result-banner {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: var(--radius);
    padding: 18px 24px;
    width: min(90vw, 380px);
    margin: 0 auto 16px;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  .result-banner.active { display: flex; }

  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-label {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .result-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    color: var(--accent);
    text-align: center;
  }

  .result-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .btn-keep, .btn-remove {
    padding: 9px 22px;
    border-radius: 50px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
  }

  .btn-keep {
    background: var(--accent);
    color: #0d0d0f;
  }

  .btn-remove {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-keep:hover, .btn-remove:hover {
    transform: scale(1.04);
    opacity: 0.9;
  }

  .choices-panel {
    width: min(90vw, 380px);
    margin: 0 auto 30px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .panel-title {
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .count-badge {
    font-size: 0.72rem;
    background: var(--surface2);
    color: var(--muted);
    padding: 2px 10px;
    border-radius: 50px;
  }

  .choices-list {
    list-style: none;
    max-height: 220px;
    overflow-y: auto;
  }

  .choices-list::-webkit-scrollbar { width: 4px; }
  .choices-list::-webkit-scrollbar-track { background: transparent; }
  .choices-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  .choice-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }

  .choice-item:last-child { border-bottom: none; }
  .choice-item:hover { background: rgba(255,255,255,0.03); }

  .choice-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .choice-name {
    flex: 1;
    font-size: 0.92rem;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 2px 4px;
    transition: color 0.15s;
    line-height: 1;
  }

  .delete-btn:hover { color: var(--accent2); }

  .add-row {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .add-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 9px 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-input:focus { border-color: rgba(240,192,64,0.4); }
  .add-input::placeholder { color: var(--muted); }

  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: #0d0d0f;
    font-size: 1.3rem;
    font-weight: 700;
    padding: 0 15px;
    cursor: pointer;
    transition: transform 0.12s;
  }

  .add-btn:hover { transform: scale(1.07); }

  .empty-state {
    text-align: center;
    padding: 28px 18px;
    color: var(--muted);
    font-size: 0.88rem;
  }

  .warning {
    font-size: 0.75rem;
    color: var(--accent2);
    text-align: center;
    margin: -10px auto 14px;
    width: min(90vw, 380px);
  }
</style>
</head>
<body>

<h1>Spin to Decide</h1>
<p class="subtitle">Let fate choose for you</p>

<div class="wheel-container">
  <div class="pointer"></div>
  <canvas id="wheelCanvas" width="760" height="760"></canvas>
  <button class="spin-btn" id="spinBtn">SPIN</button>
</div>

<div class="result-banner" id="resultBanner">
  <div class="result-label">✦ The wheel has spoken ✦</div>
  <div class="result-text" id="resultText"></div>
  <div class="result-actions">
    <button class="btn-keep" id="keepBtn">Keep it</button>
    <button class="btn-remove" id="removeBtn">Remove it</button>
  </div>
</div>

<p class="warning" id="warning" style="display:none"></p>

<div class="choices-panel">
  <div class="panel-header">
    <span class="panel-title">Your Choices</span>
    <span class="count-badge" id="countBadge">0 / 20</span>
  </div>
  <ul class="choices-list" id="choicesList"></ul>
  <div class="add-row">
    <input class="add-input" id="addInput" type="text" placeholder="Add a choice…" maxlength="40">
    <button class="add-btn" id="addBtn">+</button>
  </div>
</div>

<script>
const PALETTE = [
  '#f0c040','#e87040','#e04060','#a040c0','#4060e0',
  '#40a0e0','#40c080','#80c040','#c0a040','#c04080',
  '#6040c0','#40c0c0','#e06080','#80e040','#40a080',
  '#e0a060','#6080e0','#c06040','#40c060','#a0e060'
];

let choices = [];
let spinning = false;
let currentAngle = 0;
let lastResult = null;

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const addInput = document.getElementById('addInput');
const addBtn = document.getElementById('addBtn');
const choicesList = document.getElementById('choicesList');
const countBadge = document.getElementById('countBadge');
const resultBanner = document.getElementById('resultBanner');
const resultText = document.getElementById('resultText');
const keepBtn = document.getElementById('keepBtn');
const removeBtn = document.getElementById('removeBtn');
const warning = document.getElementById('warning');

function drawWheel(angle) {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const r = cx - 10;
  ctx.clearRect(0, 0, W, H);

  if (choices.length === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#222228';
    ctx.fill();
    ctx.strokeStyle = '#333340';
    ctx.lineWidth = 6;
    ctx.stroke();
    ctx.fillStyle = '#555550';
    ctx.font = 'bold 32px DM Sans';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Add choices', cx, cy);
    return;
  }

  const n = choices.length;
  const slice = (Math.PI * 2) / n;

  for (let i = 0; i < n; i++) {
    const start = angle + i * slice;
    const end = start + slice;
    // Segment
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = PALETTE[i % PALETTE.length];
    ctx.fill();
    ctx.strokeStyle = '#0d0d0f';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    const labelR = r * 0.58;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000000';
    const fontSize = Math.max(28, Math.min(46, 600 / n));
    ctx.font = `900 ${fontSize}px 'DM Sans', sans-serif`;
    const label = choices[i].name.length > 8 ? choices[i].name.slice(0, 7) + '…' : choices[i].name;
    ctx.fillText(label, labelR, 0);
    ctx.restore();
  }

  // Center cap
  ctx.beginPath();
  ctx.arc(cx, cy, 44, 0, Math.PI * 2);
  ctx.fillStyle = '#0d0d0f';
  ctx.fill();
  ctx.strokeStyle = '#333340';
  ctx.lineWidth = 4;
  ctx.stroke();
}

function addChoice(name) {
  name = name.trim();
  if (!name) return;
  if (choices.length >= 20) { showWarning('Maximum 20 choices reached.'); return; }
  if (choices.find(c => c.name.toLowerCase() === name.toLowerCase())) {
    showWarning('That choice already exists.');
    return;
  }
  choices.push({ name });
  hideWarning();
  renderList();
  drawWheel(currentAngle);
}

function removeChoice(name) {
  choices = choices.filter(c => c.name !== name);
  renderList();
  drawWheel(currentAngle);
}

function renderList() {
  countBadge.textContent = `${choices.length} / 20`;
  if (choices.length === 0) {
    choicesList.innerHTML = '<li class="empty-state">No choices yet — add some above!</li>';
    return;
  }
  choicesList.innerHTML = '';
  choices.forEach((c, i) => {
    const li = document.createElement('li');
    li.className = 'choice-item';
    li.innerHTML = `
      <span class="choice-dot" style="background:${PALETTE[i % PALETTE.length]}"></span>
      <span class="choice-name">${escHtml(c.name)}</span>
      <button class="delete-btn" data-name="${escHtml(c.name)}" title="Remove">×</button>
    `;
    choicesList.appendChild(li);
  });
  choicesList.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', () => removeChoice(btn.dataset.name));
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showWarning(msg) {
  warning.textContent = msg;
  warning.style.display = 'block';
}
function hideWarning() {
  warning.style.display = 'none';
}

function spin() {
  if (spinning || choices.length < 2) {
    if (choices.length < 2) showWarning('Add at least 2 choices to spin!');
    return;
  }
  spinning = true;
  spinBtn.disabled = true;
  resultBanner.classList.remove('active');
  hideWarning();

  const n = choices.length;
  const slice = (Math.PI * 2) / n;
  const extraSpins = (5 + Math.random() * 5) * Math.PI * 2;
  // Pick a random winner
  const winner = Math.floor(Math.random() * n);
  // Calculate target angle so winner is at top (pointer at -PI/2)
  // Pointer is at top = -PI/2 from 0
  // Segment i starts at currentAngle + i*slice
  // We want center of winner segment to land at -PI/2
  const targetCenter = -Math.PI / 2;
  const winnerMidInSlice = (winner + 0.5) * slice;
  let targetAngle = targetCenter - winnerMidInSlice + extraSpins;
  // Add small random offset within winner segment (not too close to edges)
  targetAngle += (Math.random() - 0.5) * slice * 0.5;

  const startAngle = currentAngle;
  const totalDelta = targetAngle - startAngle;
  const duration = 4000 + Math.random() * 1500;
  const start = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + totalDelta * easeOut(t);
    drawWheel(currentAngle);

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = startAngle + totalDelta;
      drawWheel(currentAngle);
      spinning = false;
      spinBtn.disabled = false;
      lastResult = choices[winner].name;
      resultText.textContent = lastResult;
      resultBanner.classList.add('active');
    }
  }

  requestAnimationFrame(animate);
}

spinBtn.addEventListener('click', spin);

addBtn.addEventListener('click', () => {
  addChoice(addInput.value);
  addInput.value = '';
  addInput.focus();
});

addInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    addChoice(addInput.value);
    addInput.value = '';
  }
});

keepBtn.addEventListener('click', () => {
  resultBanner.classList.remove('active');
});

removeBtn.addEventListener('click', () => {
  if (lastResult) {
    removeChoice(lastResult);
    resultBanner.classList.remove('active');
    if (choices.length < 2) showWarning('Add more choices to keep spinning!');
  }
});

// Seed with examples
['Pizza 🍕', 'Tacos 🌮', 'Sushi 🍣', 'Burgers 🍔'].forEach(addChoice);
renderList();
drawWheel(currentAngle);
</script>
</body>
</html>
