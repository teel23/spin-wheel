<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spin to Decide">
<meta name="theme-color" content="#0d0d0f">
<title>Spin to Decide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #18181c;
    --surface2: #222228;
    --accent: #f0c040;
    --accent2: #e87040;
    --text: #f5f5f0;
    --muted: #888880;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; overscroll-behavior: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    touch-action: pan-y;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    letter-spacing: -0.02em;
    padding: 18px 20px 4px;
    text-align: center;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .wheel-outer {
    position: relative;
    width: min(92vw, 420px);
    height: min(92vw, 420px);
    margin: 0 auto 12px;
  }

  canvas#wheelCanvas {
    position: absolute;
    top: 14%; left: 14%;
    width: 72%; height: 72%;
    border-radius: 50%;
    filter: drop-shadow(0 0 28px rgba(240,192,64,0.18));
  }

  svg#labelSvg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  .pointer {
    position: absolute;
    top: calc(14% - 16px);
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 13px solid transparent;
    border-right: 13px solid transparent;
    border-top: 26px solid var(--accent);
    filter: drop-shadow(0 2px 8px rgba(240,192,64,0.6));
    z-index: 10;
  }

  .spin-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    color: #0d0d0f;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    box-shadow: 0 0 0 5px var(--bg), 0 0 0 7px rgba(240,192,64,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 20;
  }
  .spin-btn:active:not(:disabled) { transform: translate(-50%, -50%) scale(0.94); }
  .spin-btn:disabled { opacity: 0.65; cursor: not-allowed; }

  .result-banner {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: var(--radius);
    padding: 16px 22px;
    width: min(92vw, 400px);
    margin: 0 auto 12px;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .result-banner.active { display: flex; }

  @keyframes popIn {
    from { transform: scale(0.82); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .result-label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

  .result-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 5vw, 2rem);
    color: var(--accent);
    text-align: center;
    word-break: break-word;
  }

  .result-actions { display: flex; gap: 10px; margin-top: 2px; }

  .btn-keep, .btn-remove {
    padding: 11px 24px;
    border-radius: 50px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.12s;
    min-height: 44px;
  }
  .btn-keep  { background: var(--accent); color: #0d0d0f; }
  .btn-remove { background: var(--surface2); color: var(--text); border: 1px solid rgba(255,255,255,0.12); }
  .btn-keep:active, .btn-remove:active { transform: scale(0.95); }

  .choices-panel {
    width: min(92vw, 400px);
    margin: 0 auto 24px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .panel-title { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .count-badge { font-size: 0.78rem; background: var(--surface2); color: var(--muted); padding: 2px 10px; border-radius: 50px; }

  .choices-list { list-style: none; max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .choices-list::-webkit-scrollbar { width: 3px; }
  .choices-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  .choice-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    min-height: 44px;
  }
  .choice-item:last-child { border-bottom: none; }

  .choice-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .choice-name { flex: 1; font-size: 1rem; }

  .delete-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1.3rem; padding: 4px 6px;
    transition: color 0.15s; line-height: 1;
    min-width: 36px; min-height: 36px;
    display: flex; align-items: center; justify-content: center;
  }
  .delete-btn:active { color: var(--accent2); }

  .add-row { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.06); }

  .add-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 10px 14px;
    outline: none;
    min-height: 44px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .add-input:focus { border-color: rgba(240,192,64,0.45); }
  .add-input::placeholder { color: var(--muted); }

  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px;
    color: #0d0d0f; font-size: 1.5rem; font-weight: 700;
    padding: 0 16px; cursor: pointer;
    min-height: 44px; min-width: 48px;
    transition: transform 0.12s;
  }
  .add-btn:active { transform: scale(0.93); }

  .empty-state { text-align: center; padding: 24px 16px; color: var(--muted); font-size: 0.9rem; }

  .warning {
    font-size: 0.78rem; color: var(--accent2);
    text-align: center; margin: -6px auto 10px;
    width: min(92vw, 400px); min-height: 1.2em;
  }
</style>
</head>
<body>

<h1>Spin to Decide</h1>
<p class="subtitle">Let fate choose for you</p>

<div class="wheel-outer">
  <div class="pointer"></div>
  <canvas id="wheelCanvas" width="760" height="760"></canvas>
  <svg id="labelSvg" viewBox="0 0 420 420"></svg>
  <button class="spin-btn" id="spinBtn">SPIN</button>
</div>

<div class="result-banner" id="resultBanner">
  <div class="result-label">✦ The wheel has spoken ✦</div>
  <div class="result-text" id="resultText"></div>
  <div class="result-actions">
    <button class="btn-keep" id="keepBtn">Keep it</button>
    <button class="btn-remove" id="removeBtn">Remove it</button>
  </div>
</div>

<p class="warning" id="warning" style="display:none"></p>

<div class="choices-panel">
  <div class="panel-header">
    <span class="panel-title">Your Choices</span>
    <span class="count-badge" id="countBadge">0 / 20</span>
  </div>
  <ul class="choices-list" id="choicesList"></ul>
  <div class="add-row">
    <input class="add-input" id="addInput" type="text" placeholder="Add a choice…" maxlength="30"
      autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false">
    <button class="add-btn" id="addBtn">+</button>
  </div>
</div>

<script>
const PALETTE = [
  '#ff2200','#ff8800','#ffdd00','#00cc44','#0066ff',
  '#cc00ff','#ff0077','#00ddff','#ff5500','#44ff00',
  '#7700ff','#ff0033','#00ffaa','#ff6600','#0099ff',
  '#ff00cc','#aaff00','#ff3300','#00ccff','#ff0099'
];

let choices = [], spinning = false, currentAngle = 0, lastResult = null;

const canvas    = document.getElementById('wheelCanvas');
const ctx       = canvas.getContext('2d');
const labelSvg  = document.getElementById('labelSvg');
const spinBtn   = document.getElementById('spinBtn');
const addInput  = document.getElementById('addInput');
const addBtn    = document.getElementById('addBtn');
const choicesList  = document.getElementById('choicesList');
const countBadge   = document.getElementById('countBadge');
const resultBanner = document.getElementById('resultBanner');
const resultText   = document.getElementById('resultText');
const keepBtn   = document.getElementById('keepBtn');
const removeBtn = document.getElementById('removeBtn');
const warning   = document.getElementById('warning');

// SVG coords: viewBox 420×420, wheel at top:14% left:14% w/h:72%
// Wheel center: (210,210), wheel radius: 420*0.72/2 = 151.2
const SVG_CX = 210, SVG_CY = 210, SVG_R = 151.2;
const LABEL_R = SVG_R + 22;

function drawWheel(angle) {
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = cx - 8;
  ctx.clearRect(0, 0, W, H);

  if (!choices.length) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = '#222228'; ctx.fill();
    ctx.strokeStyle = '#333340'; ctx.lineWidth = 6; ctx.stroke();
    ctx.fillStyle = '#555550';
    ctx.font = 'bold 30px DM Sans, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Add choices', cx, cy);
    clearLabels(); return;
  }

  const n = choices.length, slice = (Math.PI*2) / n;

  for (let i = 0; i < n; i++) {
    const start = angle + i*slice, end = start + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = PALETTE[i % PALETTE.length]; ctx.fill();
    ctx.strokeStyle = '#0d0d0f'; ctx.lineWidth = 4; ctx.stroke();
  }

  // Center cap
  ctx.beginPath();
  ctx.arc(cx, cy, 40, 0, Math.PI*2);
  ctx.fillStyle = '#0d0d0f'; ctx.fill();
  ctx.strokeStyle = '#333340'; ctx.lineWidth = 4; ctx.stroke();

  drawLabels(angle);
}

function clearLabels() {
  while (labelSvg.firstChild) labelSvg.removeChild(labelSvg.firstChild);
}

function drawLabels(angle) {
  clearLabels();
  if (!choices.length) return;
  const n = choices.length, slice = (Math.PI*2)/n;
  const fontSize = Math.max(11, Math.min(20, Math.floor(300/n)));

  // One shared defs block
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  const filter = document.createElementNS('http://www.w3.org/2000/svg','filter');
  filter.setAttribute('id','textShadow');
  filter.setAttribute('x','-30%'); filter.setAttribute('y','-30%');
  filter.setAttribute('width','160%'); filter.setAttribute('height','160%');
  const fe = document.createElementNS('http://www.w3.org/2000/svg','feDropShadow');
  fe.setAttribute('dx','0'); fe.setAttribute('dy','0');
  fe.setAttribute('stdDeviation','2.5');
  fe.setAttribute('flood-color','rgba(0,0,0,1)');
  filter.appendChild(fe); defs.appendChild(filter); labelSvg.appendChild(defs);

  for (let i = 0; i < n; i++) {
    const mid = angle + (i+0.5)*slice;
    const lx = SVG_CX + LABEL_R * Math.cos(mid);
    const ly = SVG_CY + LABEL_R * Math.sin(mid);

    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', lx); text.setAttribute('y', ly);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('dominant-baseline','middle');
    text.setAttribute('font-family','DM Sans, sans-serif');
    text.setAttribute('font-weight','700');
    text.setAttribute('font-size', fontSize);
    text.setAttribute('fill','#ffffff');
    text.setAttribute('filter','url(#textShadow)');

    let rotation = mid * 180 / Math.PI;
    if (Math.cos(mid) < 0) rotation += 180;
    text.setAttribute('transform', `rotate(${rotation},${lx},${ly})`);

    const maxChars = n <= 4 ? 14 : n <= 8 ? 10 : 7;
    const label = choices[i].name.length > maxChars
      ? choices[i].name.slice(0, maxChars-1) + '…'
      : choices[i].name;
    text.textContent = label;
    labelSvg.appendChild(text);
  }
}

function addChoice(name) {
  name = name.trim();
  if (!name) return;
  if (choices.length >= 20) { showWarning('Maximum 20 choices reached.'); return; }
  if (choices.find(c => c.name.toLowerCase() === name.toLowerCase())) {
    showWarning('That choice already exists.'); return;
  }
  choices.push({ name }); hideWarning(); renderList(); drawWheel(currentAngle);
}

function removeChoice(name) {
  choices = choices.filter(c => c.name !== name);
  renderList(); drawWheel(currentAngle);
}

function renderList() {
  countBadge.textContent = `${choices.length} / 20`;
  if (!choices.length) {
    choicesList.innerHTML = '<li class="empty-state">No choices yet — add some above!</li>'; return;
  }
  choicesList.innerHTML = '';
  choices.forEach((c, i) => {
    const li = document.createElement('li');
    li.className = 'choice-item';
    li.innerHTML = `
      <span class="choice-dot" style="background:${PALETTE[i % PALETTE.length]}"></span>
      <span class="choice-name">${escHtml(c.name)}</span>
      <button class="delete-btn" data-name="${escHtml(c.name)}" aria-label="Remove">×</button>`;
    choicesList.appendChild(li);
  });
  choicesList.querySelectorAll('.delete-btn').forEach(b =>
    b.addEventListener('click', () => removeChoice(b.dataset.name)));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showWarning(m) { warning.textContent = m; warning.style.display = 'block'; }
function hideWarning()  { warning.style.display = 'none'; }

function spin() {
  if (spinning || choices.length < 2) {
    if (choices.length < 2) showWarning('Add at least 2 choices to spin!'); return;
  }
  spinning = true; spinBtn.disabled = true;
  resultBanner.classList.remove('active'); hideWarning();

  const n = choices.length, slice = (Math.PI*2)/n;
  const extraSpins = (6 + Math.random()*5) * Math.PI*2;
  const winner = Math.floor(Math.random() * n);
  let targetAngle = (-Math.PI/2) - (winner+0.5)*slice + extraSpins;
  targetAngle += (Math.random()-0.5) * slice * 0.5;

  const startAngle = currentAngle, totalDelta = targetAngle - startAngle;
  const duration = 4200 + Math.random()*1400, start = performance.now();

  function easeOut(t) { return 1 - Math.pow(1-t, 4); }

  (function animate(now) {
    const t = Math.min((now-start)/duration, 1);
    currentAngle = startAngle + totalDelta * easeOut(t);
    drawWheel(currentAngle);
    if (t < 1) { requestAnimationFrame(animate); return; }
    currentAngle = startAngle + totalDelta;
    drawWheel(currentAngle);
    spinning = false; spinBtn.disabled = false;
    lastResult = choices[winner].name;
    resultText.textContent = lastResult;
    resultBanner.classList.add('active');
  })(start);
  requestAnimationFrame(t => {
    const step = now => {
      const prog = Math.min((now-start)/duration,1);
      currentAngle = startAngle + totalDelta * easeOut(prog);
      drawWheel(currentAngle);
      if (prog < 1) { requestAnimationFrame(step); return; }
      currentAngle = startAngle + totalDelta;
      drawWheel(currentAngle);
      spinning = false; spinBtn.disabled = false;
      lastResult = choices[winner].name;
      resultText.textContent = lastResult;
      resultBanner.classList.add('active');
    };
    requestAnimationFrame(step);
  });
}

// Fixed spin — clean version
spinBtn.onclick = null;
function doSpin() {
  if (spinning || choices.length < 2) {
    if (choices.length < 2) showWarning('Add at least 2 choices to spin!'); return;
  }
  spinning = true; spinBtn.disabled = true;
  resultBanner.classList.remove('active'); hideWarning();

  const n = choices.length, slice = (Math.PI*2)/n;
  const winner = Math.floor(Math.random()*n);
  let targetAngle = (-Math.PI/2) - (winner+0.5)*slice + (6+Math.random()*5)*Math.PI*2;
  targetAngle += (Math.random()-0.5)*slice*0.5;

  const s0 = currentAngle, delta = targetAngle - s0;
  const dur = 4200 + Math.random()*1400, t0 = performance.now();

  function step(now) {
    const p = Math.min((now-t0)/dur, 1);
    currentAngle = s0 + delta*(1-Math.pow(1-p,4));
    drawWheel(currentAngle);
    if (p < 1) { requestAnimationFrame(step); return; }
    spinning = false; spinBtn.disabled = false;
    lastResult = choices[winner].name;
    resultText.textContent = lastResult;
    resultBanner.classList.add('active');
  }
  requestAnimationFrame(step);
}

spinBtn.addEventListener('click', doSpin);
keepBtn.addEventListener('click', () => resultBanner.classList.remove('active'));
removeBtn.addEventListener('click', () => {
  if (!lastResult) return;
  removeChoice(lastResult);
  resultBanner.classList.remove('active');
  if (choices.length < 2) showWarning('Add more choices to keep spinning!');
});
addBtn.addEventListener('click', () => { addChoice(addInput.value); addInput.value=''; addInput.focus(); });
addInput.addEventListener('keydown', e => {
  if (e.key==='Enter') { addChoice(addInput.value); addInput.value=''; }
});

['Pizza 🍕','Tacos 🌮','Sushi 🍣','Burgers 🍔'].forEach(addChoice);
renderList(); drawWheel(currentAngle);
</script>
</body>
</html>
